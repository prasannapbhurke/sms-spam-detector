<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SMS Spam Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI SMS Spam Detector</h1>
            <p>Paste your message below to check if it's safe or spam.</p>
        </header>

        <main>
            <div class="input-card">
                <textarea id="messageInput" placeholder="Enter SMS message here... (e.g., 'You won a free iPhone! Click here')"></textarea>
                <button id="checkButton">Analyze Message</button>
            </div>

            <div id="resultContainer" class="result-card hidden">
                <div class="result-header">
                    <h2 id="predictionResult">Analysis Result</h2>
                </div>
                <div class="score-container">
                    <div class="score-label">Spam Probability</div>
                    <div class="progress-bg">
                        <div id="spamScoreBar" class="progress-fill"></div>
                    </div>
                    <div id="spamScoreText" class="score-value">0%</div>
                </div>
                <div id="insightText" class="insight-text"></div>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 AI Spam Detector Project</p>
        </footer>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
