version: '3.8'

services:
  apk-builder:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - ./bin:/app/bin
    working_dir: /app
    environment:
      - ANDROID_HOME=/opt/android-sdk
      - JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
    command: /bin/bash -c "buildozer android debug && echo 'Build complete! Check bin/ folder'"

